    <!-- 页面主体 -->
    <main class="events-page">
        <div class="container">

            <!-- 活动列表（JS 动态渲染） -->

                <!-- 加载中占位 -->
                <div class="loading-placeholder" style="text-align:center;padding:60px 0;color:#888;">
                    載入中...
                </div>
            </div>

            <!-- 联系方式 -->

                <h2>聯繫我們</h2>
                <p class="contact-desc">對以上活動感興趣？歡迎隨時聯繫我們獲取詳細資料</p>
                <div class="contact-simple">
                    <div class="contact-item">
                        <span>📞</span>
                        <span>+8613423849513</span>
                    </div>
                    <div class="contact-item">
                        <span>💬</span>
                        <span>微信：5311667</span>
                    </div>
                    <div class="contact-item">
                        <span>✉️</span>
                        <span>claudedeng@aseanibc.com</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>埃森國際商務諮詢有限公司</h4>
                    <p>專業跨境商務與項目落地顧問</p>
                </div>
                <div class="footer-col">
                    <h4>服務內容</h4>
                </div>
                <div class="footer-col">
                    <h4>關於我們</h4>
                </div>
                <div class="footer-col">
                    <h4>聯繫我們</h4>
                    <p>聯繫方式</p>
                    <p>在線咨詢</p>
                    <p>信息來源</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2025 埃森國際商務諮詢有限公司</p>
            </div>
        </div>
    </footer>

    <script>
        const CMS_API_BASE = 'http://127.0.0.1:1337';
        const API_TOKEN = '4566e39fb70c3a1e3819ce9f27584fc2b7fae06f1e2f0c26f7bded2aff339f90978b2ea628f485f0d8baa3d7848398170329f13a47474a99b1f7ec4cd7900da458fa782f2162693885b65115b3c52f977c5620040c79326b3c12fe02bc2edfcb2821fbb0a460bbfa0d8dfe83d358ddbe3f3c9b226a3afdd5a7ffd1b8880e2989';

        // category enum → 中文标签（与 Event schema enum 对应）
        const CATEGORY_LABELS = {
            'business':    '商業考察',
            'education':   '國際教育',
            'investment':  '海外投資',
            'forum':       '國際論壇',
        };

        // category → 详情页文件名（对应 4 个静态详情页）
        const DETAIL_PAGE_MAP = {
            'business':   'event-detail.html?type=business',
            'education':  'event-detail.html?type=education',
            'investment': 'event-detail.html?type=investment',
            'forum':      'event-detail.html?type=forum',
        };

        async function api(path) {
            const res = await fetch(CMS_API_BASE + path, {
                headers: { 'Authorization': 'Bearer ' + API_TOKEN }
            });
            if (!res.ok) throw new Error(`API ${res.status}: ${path}`);
            return res.json();
        }

        function getImageUrl(img) {
            if (!img) return '';
            const url = (img.formats && img.formats.medium && img.formats.medium.url) || img.url || '';
            return url.startsWith('http') ? url : CMS_API_BASE + url;
        }

        async function init() {
            try {
                const listEl = document.getElementById('events-list');
                const data = await api('/api/events?populate=*&sort=createdAt:desc');

                if (!data || data.length === 0) {
                    listEl.innerHTML = '<p style="text-align:center;padding:60px 0;color:#888;">暫無活動資訊</p>';
                    return;
                }

                listEl.innerHTML = '';
                data.forEach(ev => {
                    const tag = CATEGORY_LABELS[ev.category] || ev.category || '活動';
                    const href = DETAIL_PAGE_MAP[ev.category] || 'events.html';
                    const imgUrl = getImageUrl(ev.coverImage);
                    const fallbackImg = 'eventPic/thumb-copenhagen.jpg';

                    const card = document.createElement('div');
                    card.className = 'event-card animate-on-scroll';
                    card.innerHTML = `
                        <div class="event-image">
                            <img src="${imgUrl || fallbackImg}" alt="${ev.title || ''}">
                        </div>
                        <div class="event-content">
                            <div class="event-meta">
                                <span class="event-tag">${tag}</span>
                                <span class="event-date">${ev.eventDate || ''}</span>
                            </div>
                            <h2 class="event-title">${ev.title || ''}</h2>
                            <p class="event-location">📍 ${ev.location || ''}</p>
                            <p class="event-desc">${ev.overview ? ev.overview.replace(/<[^>]+>/g, '').substring(0, 120) + '…' : ''}</p>
                            <a href="${href}" class="btn btn-primary">了解詳情</a>
                        </div>
                    `;
                    listEl.appendChild(card);
                });

                // 重新绑定动画
                initScrollAnimation();

            } catch (err) {
                console.error(err);
                document.getElementById('events-list').innerHTML =
                    '<p style="text-align:center;padding:60px 0;color:#888;">載入失敗，請稍後重試</p>';
            }
        }

        // 滚动动画
        function initScrollAnimation() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animated');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.animate-on-scroll:not(.observed)').forEach(el => {
                el.classList.add('observed');
                observer.observe(el);
            });
        }

        // 汉堡菜单功能
        function initMenu() {
            const menuToggle = document.querySelector('.menu-toggle');
            const nav = document.querySelector('.nav');
            const navOverlay = document.querySelector('.nav-overlay');

            if (!menuToggle || !nav) return;

            menuToggle.addEventListener('click', () => {
                const isOpen = nav.classList.toggle('nav-open');
                menuToggle.setAttribute('aria-expanded', isOpen);
                if (navOverlay) navOverlay.classList.toggle('active', isOpen);
            });

            nav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    nav.classList.remove('nav-open');
                    menuToggle.setAttribute('aria-expanded', 'false');
                    if (navOverlay) navOverlay.classList.remove('active');
                });
            });

            if (navOverlay) {
                navOverlay.addEventListener('click', () => {
                    nav.classList.remove('nav-open');
                    menuToggle.setAttribute('aria-expanded', 'false');
                    navOverlay.classList.remove('active');
                });
            }
        }

        initMenu();
        initScrollAnimation();
        init();
    </script>
</body>
</html>
