<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出海活動詳情 - 埃森國際商務諮詢有限公司</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 图片轮播样式 */
        .image-carousel {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
        }
        .carousel-slide {
            min-width: 100%;
            height: 100%;
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #f5f5f5;
        }
        .carousel-nav {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carousel-dot.active {
            background: white;
            transform: scale(1.2);
        }
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #333;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .carousel-arrow:hover {
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .carousel-arrow.prev { left: 20px; }
        .carousel-arrow.next { right: 20px; }
        /* 详情页 meta 样式 */
        .case-meta { display: flex; gap: 24px; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 6px; }
        .meta-label { color: #888; font-size: 14px; }
        .meta-value { color: #333; font-size: 14px; font-weight: 600; }
        /* CTA 按钮组 */
        .case-footer { display: flex; gap: 16px; margin-top: 60px; flex-wrap: wrap; }
        .btn-secondary {
            display: inline-block;
            padding: 12px 28px;
            background: #fff;
            color: #1a5f7a;
            border: 2px solid #1a5f7a;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover { background: #f0f8ff; }
        /* 服务优势列表 */
        .service-checklist { margin-top: 16px; }
        .checklist-item {
            padding: 12px 20px;
            background: #f8f9fa;
            border-left: 4px solid #1a5f7a;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            color: #333;
        }
        /* 适合人群 */
        .consideration-list { display: flex; flex-direction: column; gap: 16px; }
        .consideration-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px 24px;
            border-left: 4px solid #1a5f7a;
        }
        .consideration-content h4 { margin: 0 0 8px; color: #1a5f7a; font-size: 16px; }
        .consideration-content p { margin: 0; color: #555; font-size: 14px; }
        /* 合作品牌 */
        .partners-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .partner-tag {
            display: inline-block;
            padding: 6px 16px;
            background: #e8f4f8;
            color: #1a5f7a;
            border-radius: 20px;
            font-size: 14px;
        }
        /* highlightCards 网格 */
        .highlight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 16px; }
        .highlight-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-top: 4px solid #1a5f7a;
        }
        .highlight-card h4 { margin: 10px 0 6px; color: #1a5f7a; font-size: 16px; }
        .highlight-card p { margin: 0; color: #555; font-size: 14px; }
        /* logistics 列表 */
        .logistics-list { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
        .logistics-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px 24px;
            border-left: 4px solid #d4a017;
        }
        .logistics-card h4 { margin: 0 0 10px; color: #d4a017; font-size: 16px; }
        /* 媒体矩阵 */
        .policy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 16px; }
        .policy-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-top: 4px solid #1a5f7a;
        }
        .policy-card h4 { margin: 10px 0 8px; color: #1a5f7a; font-size: 15px; }
        .policy-card p { margin: 0; color: #555; font-size: 13px; }
        @media (max-width: 768px) {
            .image-carousel { height: 300px; }
            .carousel-arrow { width: 40px; height: 40px; font-size: 16px; }
            .case-meta { flex-direction: column; gap: 8px; }
            .case-footer { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">埃森國際商務諮詢有限公司</div>
            <button class="menu-toggle" aria-label="打开菜单" aria-expanded="false">
                <span class="hamburger"></span>
            </button>
            <nav class="nav">
                <a href="index.html">首页</a>
                <a href="about.html">關於我們</a>
                <a href="services.html">服務內容</a>
                <a href="events.html" class="active">出海活動</a>
                <a href="cases.html">項目經驗</a>
                <a href="team.html">團隊介紹</a>
                <a href="contact.html">聯繫我們</a>
            </nav>
            <div class="nav-overlay"></div>
        </div>
    </header>

    <!-- 详情页面 -->
    <main class="case-detail-page">
        <div class="container">
            <!-- 返回按钮 -->
            <div class="back-nav animate-on-scroll">
                <a href="events.html">← 返回出海活動</a>
            </div>

            <!-- 标题区（JS 动态） -->
            <section class="case-header animate-on-scroll" id="case-header"></section>

            <!-- 图片轮播（JS 动态） -->
            <div class="image-carousel animate-on-scroll" id="carousel" style="display:none;">
                <div class="carousel-track" id="carousel-track"></div>
                <div class="carousel-arrow prev" id="carousel-prev">❮</div>
                <div class="carousel-arrow next" id="carousel-next">❯</div>
                <div class="carousel-nav" id="carousel-nav"></div>
            </div>

            <!-- 内容区（JS 动态） -->
            <article class="case-content" id="case-content"></article>

            <!-- 底部导航 -->
            <div class="case-footer animate-on-scroll">
                <a href="events.html" class="btn btn-primary">查看更多活動</a>
                <a href="contact.html" class="btn-secondary">聯繫我們</a>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>埃森國際商務諮詢有限公司</h4>
                    <p>專業跨境商務與項目落地顧問</p>
                </div>
                <div class="footer-col">
                    <h4>服務內容</h4>
                </div>
                <div class="footer-col">
                    <h4>關於我們</h4>
                </div>
                <div class="footer-col">
                    <h4>聯繫我們</h4>
                    <p>聯繫方式</p>
                    <p>在線咨詢</p>
                    <p>信息來源</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2025 埃森國際商務諮詢有限公司</p>
            </div>
        </div>
    </footer>

    <script>
        const CMS_API_BASE = 'http://127.0.0.1:1337';
        const API_TOKEN = '4566e39fb70c3a1e3819ce9f27584fc2b7fae06f1e2f0c26f7bded2aff339f90978b2ea628f485f0d8baa3d7848398170329f13a47474a99b1f7ec4cd7900da458fa782f2162693885b65115b3c52f977c5620040c79326b3c12fe02bc2edfcb2821fbb0a460bbfa0d8dfe83d358ddbe3f3c9b226a3afdd5a7ffd1b8880e2989';

        // category enum → 中文标签
        const CATEGORY_LABELS = {
            'business':    '出海活動｜商業考察',
            'education':   '出海活動｜國際教育',
            'investment':  '出海活動｜海外投資',
            'forum':      '出海活動｜國際論壇',
        };

        async function api(path) {
            const res = await fetch(CMS_API_BASE + path, {
                headers: { 'Authorization': 'Bearer ' + API_TOKEN }
            });
            if (!res.ok) throw new Error(`API ${res.status}: ${path}`);
            return res.json();
        }

        function getImageUrl(img) {
            if (!img) return '';
            const url = (img.formats && img.formats.medium && img.formats.medium.url) || img.url || '';
            return url.startsWith('http') ? url : CMS_API_BASE + url;
        }

        // 渲染 meta 标题区
        function renderHeader(ev) {
            const catLabel = CATEGORY_LABELS[ev.category] || '出海活動';
            document.title = (ev.metaTitle || ev.title) + ' - 埃森國際商務諮詢有限公司';
            document.getElementById('case-header').innerHTML = `
                <div class="case-category">${catLabel}</div>
                <h1>${ev.title || ''}</h1>
                <div class="case-meta">
                    <div class="meta-item">
                        <span class="meta-label">時間：</span>
                        <span class="meta-value">${ev.eventDate || ''}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">地點：</span>
                        <span class="meta-value">${ev.location || ''}</span>
                    </div>
                    ${ev.scale ? `
                    <div class="meta-item">
                        <span class="meta-label">規模：</span>
                        <span class="meta-value">${ev.scale}</span>
                    </div>` : ''}
                </div>
            `;
        }

        // 渲染轮播（coverImage 在前，gallery 追加）
        function renderCarousel(ev) {
            const carousel = document.getElementById('carousel');
            const track = document.getElementById('carousel-track');
            const nav = document.getElementById('carousel-nav');
            const prevBtn = document.getElementById('carousel-prev');
            const nextBtn = document.getElementById('carousel-next');

            const images = [];
            const coverUrl = getImageUrl(ev.coverImage);
            if (coverUrl) images.push(coverUrl);
            if (ev.gallery && Array.isArray(ev.gallery)) {
                ev.gallery.forEach(img => {
                    const url = getImageUrl(img);
                    if (url && url !== coverUrl) images.push(url);
                });
            }

            if (images.length === 0) return; // 无图则不渲染

            carousel.style.display = 'block';

            images.forEach((src, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `<img src="${src}" alt="${ev.title || ''}">`;
                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                nav.appendChild(dot);
            });

            // 轮播逻辑
            let current = 0;
            let direction = 1;
            let isPaused = false;

            function update() {
                track.style.transform = `translateX(-${current * 100}%)`;
                nav.querySelectorAll('.carousel-dot').forEach((d, i) => {
                    d.classList.toggle('active', i === current);
                });
            }

            function move(dir) {
                current += dir;
                if (current >= images.length - 1) { current = images.length - 1; direction = -1; }
                else if (current <= 0) { current = 0; direction = 1; }
                update();
            }

            function goToSlide(i) {
                current = i;
                direction = (i < images.length - 1) ? 1 : -1;
                update();
            }

            prevBtn.onclick = () => move(-1);
            nextBtn.onclick = () => move(1);

            let autoplay = setInterval(() => { if (!isPaused) move(direction); }, 5000);
            carousel.addEventListener('mouseenter', () => { isPaused = true; });
            carousel.addEventListener('mouseleave', () => { isPaused = false; });
        }

        // 渲染 section（richtext 直接 innerHTML）
        function section(title, content, extraClass) {
            if (!content) return '';
            return `
                <section class="case-section animate-on-scroll ${extraClass || ''}">
                    <h2>${title}</h2>
                    ${content}
                </section>
            `;
        }

        // 渲染 highlightCards 组件
        function renderHighlightCards(cards) {
            if (!cards || cards.length === 0) return '';
            let html = '<section class="case-section animate-on-scroll"><h2>核心賣點</h2><div class="highlight-grid">';
            cards.forEach(card => {
                html += `
                    <div class="highlight-card">
                        ${card.icon ? `<span style="font-size:24px">${card.icon}</span>` : ''}
                        <h4>${card.title || ''}</h4>
                        <p>${card.description || ''}</p>
                        ${card.content ? `<p style="margin-top:8px;color:#555;font-size:13px">${card.content}</p>` : ''}
                    </div>
                `;
            });
            html += '</div></section>';
            return html;
        }

        // 渲染 logistics 组件
        function renderLogistics(cards) {
            if (!cards || cards.length === 0) return '';
            let html = '<section class="case-section animate-on-scroll"><h2>行程安排</h2><div class="logistics-list">';
            cards.forEach(card => {
                html += `
                    <div class="logistics-card">
                        <h4>${card.title || ''}</h4>
                        ${card.content ? `<div>${card.content}</div>` : ''}
                    </div>
                `;
            });
            html += '</div></section>';
            return html;
        }

        // 渲染 servicesOffered 组件
        function renderServicesOffered(items) {
            if (!items || items.length === 0) return '';
            let html = '<section class="case-section animate-on-scroll"><h2>展台服務</h2><div class="service-checklist">';
            items.forEach(item => {
                html += `<div class="checklist-item">${item.title || ''} — ${item.content || ''}</div>`;
            });
            html += '</div></section>';
            return html;
        }

        // 渲染推荐人群（consideration items）
        function renderRecommendedFor(content) {
            if (!content) return '';
            // richtext 格式，包裹在 consideration-list 里
            return `
                <section class="case-section animate-on-scroll">
                    <h2>推薦參與對象</h2>
                    <div class="consideration-list">
                        <div class="consideration-item">
                            <div class="consideration-content">
                                ${content}
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        // 渲染合作伙伴标签
        function renderPartners(content) {
            if (!content) return '';
            // 尝试解析 <ul><li>xxx</li>...</ul> 或逗号分隔
            let tags = [];
            const liMatches = content.matchAll(/<li>(.*?)<\/li>/g);
            for (const m of liMatches) tags.push(m[1].replace(/<[^>]+>/g, '').trim());
            if (tags.length === 0) {
                tags = content.split(/[,，、]/).map(t => t.trim()).filter(Boolean);
            }
            const tagHtml = tags.length > 0
                ? '<div class="partners-list">' + tags.map(t => `<span class="partner-tag">${t}</span>`).join('') + '</div>'
                : `<div>${content}</div>`;
            return `
                <section class="case-section animate-on-scroll">
                    <h2>往屆合作品牌</h2>
                    ${tagHtml}
                </section>
            `;
        }

        // 主渲染
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('type'); // business/education/investment/forum

            try {
                // 按 category 筛选（精确匹配）
                const filter = category
                    ? `?populate=*&filters[category][$eq]=${category}&pagination[limit]=1`
                    : '?populate=*&pagination[limit]=1';
                const data = await api('/api/events' + filter);

                if (!data || data.length === 0) {
                    document.getElementById('case-content').innerHTML = '<p style="text-align:center;padding:60px 0;">找不到相關活動</p>';
                    return;
                }

                const ev = data[0];
                renderHeader(ev);
                renderCarousel(ev);

                const content = document.getElementById('case-content');
                let html = '';

                // 项目概述（overview）— richtext 直接 innerHTML，不额外包 p
                if (ev.overview) {
                    html += section('項目概述', ev.overview);
                }

                // 市场背景
                if (ev.background) {
                    html += section('市場背景與機遇', ev.background);
                }

                // 核心卖点：highlightCards 组件优先（避免与 highlights richtext 双重）
                if (ev.highlightCards && ev.highlightCards.length > 0) {
                    html += renderHighlightCards(ev.highlightCards);
                } else if (ev.highlights) {
                    // highlightCards 无内容时 fallback 到 highlights richtext
                    html += section('核心賣點', ev.highlights);
                }

                // 合作伙伴
                if (ev.partners) {
                    html += renderPartners(ev.partners);
                }

                // 展台服务
                if (ev.boothServices) {
                    html += section('展台服務', ev.boothServices);
                }

                // servicesOffered 组件
                if (ev.servicesOffered && ev.servicesOffered.length > 0) {
                    html += renderServicesOffered(ev.servicesOffered);
                }

                // 行程安排：itinerary richtext 优先，logistics component 作为 fallback
                if (ev.itinerary) {
                    html += section('考察團行程安排', ev.itinerary);
                } else if (ev.logistics && ev.logistics.length > 0) {
                    html += renderLogistics(ev.logistics);
                }

                // 推荐人群（recommendedFor 无内容时显示默认兜底）
                const recommendedContent = ev.recommendedFor || `
                    <p>有意參與此類活動的企業家、投資者或家庭，歡迎聯繫我們了解詳情。</p>
                `;
                html += renderRecommendedFor(recommendedContent);

                // 服务优势
                if (ev.serviceAdvantage) {
                    html += section('埃森國際服務優勢', ev.serviceAdvantage);
                }

                // 联系方式
                if (ev.contactInfo) {
                    html += section('聯繫我們', ev.contactInfo);
                } else {
                    html += section('聯繫我們', `
                        <p>對本次活動感興趣？歡迎聯繫我們獲取詳細行程和報名資料。</p>
                        <div class="service-checklist">
                            <div class="checklist-item">📞 電話：+8613423849513</div>
                            <div class="checklist-item">✉️ 郵箱：claudedeng@aseanibc.com</div>
                            <div class="checklist-item">💬 微信：5311667</div>
                        </div>
                    `);
                }

                content.innerHTML = html;
                initScrollAnimation();

            } catch (err) {
                console.error(err);
                document.getElementById('case-content').innerHTML = '<p style="text-align:center;padding:60px 0;">載入失敗，請稍後重試</p>';
            }
        }

        function initScrollAnimation() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('animated');
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.animate-on-scroll:not(.observed)').forEach(el => {
                el.classList.add('observed');
                observer.observe(el);
            });
        }

        function initMenu() {
            const menuToggle = document.querySelector('.menu-toggle');
            const nav = document.querySelector('.nav');
            const navOverlay = document.querySelector('.nav-overlay');
            if (!menuToggle || !nav) return;

            menuToggle.addEventListener('click', () => {
                const isOpen = nav.classList.toggle('nav-open');
                menuToggle.setAttribute('aria-expanded', isOpen);
                if (navOverlay) navOverlay.classList.toggle('active', isOpen);
            });
            nav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    nav.classList.remove('nav-open');
                    menuToggle.setAttribute('aria-expanded', 'false');
                    if (navOverlay) navOverlay.classList.remove('active');
                });
            });
            if (navOverlay) {
                navOverlay.addEventListener('click', () => {
                    nav.classList.remove('nav-open');
                    menuToggle.setAttribute('aria-expanded', 'false');
                    navOverlay.classList.remove('active');
                });
            }
        }

        initMenu();
        initScrollAnimation();
        init();
    </script>
</body>
</html>
